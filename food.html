<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Food Selection</title>
		<link rel="stylesheet" href="css/food.css" />
	</head>
	<body>
		<div id="foodquestion">
			<b>Чо бы ты хотела?</b>
		</div>

		<div class="food-selection">
			<div class="food-item">
				<img src="food/burgers.jpeg" alt="Burgers, fries and fried chicken" />
				<label
					><input
						type="checkbox"
						name="food"
						value="Burgers, fries and fried chicken"
					/>
					Бургеры, фри и фастфуд хз</label
				>
			</div>
			<div class="food-item">
				<img src="food/dog.jpeg" alt="dog" />
				<label
					><input type="checkbox" name="food" value="hotdog" /> Горячая собака</label
				>
			</div>
			<div class="food-item">
				<img src="food/koreanfood.jpeg" alt="koreanfood" />
				<label
					><input type="checkbox" name="food" value="Korean food" /> карейский
					еда</label
				>
			</div>
			<div class="food-item">
				<img src="food/pasta.jpeg" alt="pasta" />
				<label><input type="checkbox" name="food" value="pasta" /> лагман</label>
			</div>
			<div class="food-item">
				<img src="food/pizza.jpeg" alt="pizza" />
				<label><input type="checkbox" name="food" value="pizza" /> додошка</label>
			</div>
			<div class="food-item">
				<img src="food/salad.jpeg" alt="salad" />
				<label
					><input type="checkbox" name="food" value="salad" /> salad цезаррььь</label
				>
			</div>
			<div class="food-item">
				<img src="food/steak.jpeg" alt="steak" />
				<label
					><input type="checkbox" name="food" value="steak" /> мистейк
					бифстейк</label
				>
			</div>
			<div class="food-item">
				<img src="food/sushi.jpeg" alt="sushi" />
				<label
					><input type="checkbox" name="food" value="sushi" /> рис и это как
					его</label
				>
			</div>
		</div>
		<button class="button" onclick="location.href='dessert.html'">
			Продолжить...
		</button>
	</body>
</html>
